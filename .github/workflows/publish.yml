name: Publicar Instagram 5asec (DESATIVADO - agora roda no n8n)
# O agendamento foi movido para o n8n (workflow tWIZffK2UvKYhDg3).
# Este repositório permanece apenas como HOST das imagens (CDN jsDelivr).
# Mantido só o disparo manual, para eventual teste/backup.
on:
  workflow_dispatch:
    inputs:
      dry_run:   { description: 'Só testar (não publica)', type: boolean, default: true }
      force_date: { description: 'Forçar data DD/MM', type: string, default: '' }
      force_slot: { description: 'Forçar slot: story|feed|reels', type: string, default: '' }
jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Publicar
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          FORCE_DATE: ${{ github.event.inputs.force_date }}
          FORCE_SLOT: ${{ github.event.inputs.force_slot }}
        run: python3 publish.py
